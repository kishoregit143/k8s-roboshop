apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop  # we must give name space otherwaise it go into default namespace.

  labels:
    project: roboshop
    component: mongodb
    tier: db
spec:
  replicaSet: 1
  selector:
    # these labels are used to select pods
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db
  # pod definition
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        tier: db
    spec:
      containers:
      - name: mongodb
        image: kishorelinux/mongodb:v1 